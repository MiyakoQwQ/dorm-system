# ============================================
# MySQL 数据库配置（课程公共数据库 - java_2_14）
# ============================================
spring.datasource.url=jdbc:mysql://202.194.14.120:3306/java_2_14?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=java_2_14
spring.datasource.password=JavaP214@

# 连接池配置
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=false

# JPA 配置
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 初始化数据（首次启动时执行）- 已禁用，使用 /api/users/init 接口手动初始化
spring.sql.init.mode=never
